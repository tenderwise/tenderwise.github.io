<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Left alarm bell -->
<circle cx="3.5" cy="4.5" r="1.5" stroke="white" stroke-width="1" fill="none"/>

<!-- Right alarm bell -->
<circle cx="12.5" cy="4.5" r="1.5" stroke="white" stroke-width="1" fill="none"/>

<!-- Main clock body -->
<circle cx="8" cy="8" r="4.5" stroke="white" stroke-width="1.2" fill="none"/>

<!-- Clock hands -->
<path d="M8 8V5.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
<path d="M8 8L10.5 9.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

<!-- Center dot -->
<circle cx="8" cy="8" r="0.8" fill="white"/>
</svg>